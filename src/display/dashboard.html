<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>趋势跟随系统 — Dashboard</title>
<style>
/* ===== Reset & Variables ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-card-hover: #222534;
  --bg-sidebar: #13151f;
  --border: #2a2d3a;
  --text: #e1e4eb;
  --text-muted: #8b8fa3;
  --text-dim: #5a5e73;
  --green: #26a69a;
  --green-bg: rgba(38,166,154,0.12);
  --red: #ef5350;
  --red-bg: rgba(239,83,80,0.12);
  --yellow: #ffb74d;
  --yellow-bg: rgba(255,183,77,0.12);
  --blue: #42a5f5;
  --blue-bg: rgba(66,165,245,0.12);
  --purple: #ab47bc;
  --orange: #ff7043;
  --radius: 8px;
  --radius-sm: 4px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --transition: 0.2s ease;
}

html, body { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-size: 14px;
  display: flex;
  overflow: hidden;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
}

.sidebar-header .subtitle {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.date-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.date-nav-item {
  display: block;
  width: 100%;
  padding: 8px 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: var(--transition);
  margin-bottom: 2px;
}

.date-nav-item:hover { background: var(--bg-card-hover); color: var(--text); }
.date-nav-item.active { background: var(--blue-bg); color: var(--blue); font-weight: 600; }
.date-nav-item.today { border-left: 3px solid var(--green); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
}

/* ===== Main ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== Top Bar ===== */
.topbar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.topbar-date {
  font-size: 15px;
  font-weight: 700;
}

.topbar-date small {
  font-weight: 400;
  color: var(--text-muted);
  margin-left: 6px;
}

.topbar-status {
  display: flex;
  gap: 12px;
  align-items: center;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

.status-dot.ok { background: var(--green); }
.status-dot.err { background: var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ===== Overview Cards ===== */
.overview {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  padding: 16px 20px;
  flex-shrink: 0;
}

.overview-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.overview-card .label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.overview-card .value {
  font-size: 28px;
  font-weight: 700;
}

.overview-card .sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
}

.overview-card.green .value { color: var(--green); }
.overview-card.blue .value { color: var(--blue); }
.overview-card.purple .value { color: var(--purple); }
.overview-card.orange .value { color: var(--orange); }
.overview-card.red .value { color: var(--red); }

/* ===== Content Area ===== */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0 20px 16px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab-btn {
  padding: 10px 20px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: var(--transition);
}

.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
}

.tab-content {
  flex: 1;
  overflow-y: auto;
  padding-top: 12px;
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== Table ===== */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.data-table thead {
  position: sticky;
  top: 0;
  z-index: 1;
}

.data-table th {
  background: var(--bg-card);
  color: var(--text-muted);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.data-table tbody tr {
  cursor: pointer;
  transition: var(--transition);
}

.data-table tbody tr:hover { background: var(--bg-card-hover); }
.data-table tbody tr.expanded { background: var(--bg-card); }

/* State badges */
.state-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}

.state-1 { background: var(--red-bg); color: var(--red); }
.state-2 { background: var(--yellow-bg); color: var(--yellow); }
.state-3 { background: var(--blue-bg); color: var(--blue); }
.state-4 { background: var(--green-bg); color: var(--green); }
.state-5 { background: var(--green-bg); color: var(--green); }
.state-3p { background: var(--yellow-bg); color: var(--orange); }

/* Score bar */
.score-bar {
  display: flex;
  align-items: center;
  gap: 6px;
}

.score-bar-inner {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}

.score-bar-fill.high { background: var(--green); }
.score-bar-fill.mid { background: var(--yellow); }
.score-bar-fill.low { background: var(--red); }

/* Condition indicators */
.cond-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 2px;
}

.cond-dot.pass { background: var(--green); }
.cond-dot.fail { background: var(--red); }

/* ===== Expand Row ===== */
.expand-row { display: none; }
.expand-row.open { display: table-row; }

.expand-row td {
  background: var(--bg);
  padding: 16px 20px;
  border-bottom: 2px solid var(--border);
}

.why-section {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}

.why-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 14px;
  border: 1px solid var(--border);
}

.why-card h4 {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.why-card .why-detail {
  font-size: 13px;
  line-height: 1.6;
}

.why-card .why-detail.pass { color: var(--green); }
.why-card .why-detail.fail { color: var(--red); }

.why-section-extra {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.why-extra-item {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 12px 14px;
  border: 1px solid var(--border);
}

.why-extra-item h4 {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.why-extra-item .val {
  font-size: 14px;
  font-weight: 600;
}

/* ===== Key Actions ===== */
.key-actions-panel {
  background: var(--bg-card);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  flex-shrink: 0;
}

.key-actions-panel h3 {
  font-size: 14px;
  color: var(--red);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.key-action-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.key-action-item:last-child { border-bottom: none; }

.key-action-item .priority-icon { font-size: 18px; }
.key-action-item .action-label { font-weight: 700; min-width: 56px; }
.key-action-item .transition-label { color: var(--text-muted); min-width: 50px; }
.key-action-item .desc { flex: 1; color: var(--text-muted); }

.priority-red .action-label { color: var(--red); }
.priority-orange .action-label { color: var(--orange); }
.priority-green .action-label { color: var(--green); }
.priority-yellow .action-label { color: var(--yellow); }

/* ===== Scenario Cards ===== */
.scenario-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}

.scenario-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.scenario-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.scenario-card-header .name {
  font-weight: 700;
  font-size: 14px;
}

.scenario-card-header .state {
  font-size: 12px;
  color: var(--text-muted);
}

.scenario-item {
  padding: 10px 12px;
  margin-bottom: 8px;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--border);
}

.scenario-item.prob-high { border-left-color: var(--green); background: var(--green-bg); }
.scenario-item.prob-mid { border-left-color: var(--yellow); background: var(--yellow-bg); }
.scenario-item.prob-low { border-left-color: var(--red); background: var(--red-bg); }

.scenario-item .s-label {
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 4px;
}

.scenario-item .s-cond {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.scenario-item .s-action {
  font-size: 12px;
  font-weight: 600;
}

/* ===== Positions ===== */
.position-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.position-row:last-child { border-bottom: none; }

.position-total {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  font-weight: 700;
  display: flex;
  justify-content: space-between;
}

/* ===== Watchlist ===== */
.watchlist-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.watchlist-item:last-child { border-bottom: none; }

.watchlist-item .wl-symbol { font-weight: 700; }
.watchlist-item .wl-reason { color: var(--text-muted); flex: 1; }
.watchlist-item .wl-ph { color: var(--blue); font-size: 12px; }

/* ===== Bottom Panel ===== */
.bottom-panels {
  flex-shrink: 0;
  max-height: 320px;
  overflow-y: auto;
  padding-bottom: 8px;
}

.panel-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}

.panel-card h3 {
  font-size: 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-badge {
  background: var(--blue-bg);
  color: var(--blue);
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}

/* ===== External Link ===== */
.ext-link {
  color: var(--blue);
  text-decoration: none;
  font-size: 12px;
  transition: var(--transition);
}

.ext-link:hover { text-decoration: underline; color: var(--text); }

/* ===== Empty / Loading State ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* ===== Comparison ===== */
.comp-section {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.comp-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
}

.comp-tag.up { background: var(--green-bg); color: var(--green); }
.comp-tag.down { background: var(--red-bg); color: var(--red); }
.comp-tag.changed { background: var(--yellow-bg); color: var(--yellow); }

/* ===== Breadth ===== */
.breadth-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.breadth-item {
  text-align: center;
}

.breadth-item .bval {
  font-size: 22px;
  font-weight: 700;
}

.breadth-item .blabel {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ===== Responsive ===== */
@media (max-width: 1200px) {
  .overview { grid-template-columns: repeat(3, 1fr); }
  .why-section { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 768px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; min-width: 100%; max-height: 120px; flex-shrink: 0; }
  .overview { grid-template-columns: repeat(2, 1fr); padding: 12px; }
  .why-section { grid-template-columns: 1fr; }
  .scenario-grid { grid-template-columns: 1fr; }
  .content { padding: 0 12px 12px; }
  .topbar { padding: 10px 12px; }
}
</style>
</head>
<body>

<!-- ==================== SIDEBAR ==================== -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>趋势跟随系统</h1>
    <div class="subtitle">Trend Following Dashboard</div>
  </div>
  <nav class="date-nav" id="dateNav">
    <div class="empty-state" style="padding:20px">
      <div style="font-size:12px">加载日期列表中...</div>
    </div>
  </nav>
  <div class="sidebar-footer" id="sidebarFooter">
    就绪 — 等待加载数据
  </div>
</aside>

<!-- ==================== MAIN ==================== -->
<main class="main">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-date">
      <span id="topbarDate">--</span>
      <small id="topbarGenTime"></small>
    </div>
    <div class="topbar-status">
      <span id="topbarMood" style="font-size:13px;color:var(--text-muted)"></span>
      <div class="status-dot ok" id="statusDot"></div>
    </div>
  </div>

  <!-- Overview Cards -->
  <div class="overview" id="overview"></div>

  <!-- Tabs + Tables -->
  <div class="content">
    <div class="tabs">
      <button class="tab-btn active" data-tab="sectors">板块</button>
      <button class="tab-btn" data-tab="themes">题材</button>
      <button class="tab-btn" data-tab="stocks">个股</button>
      <button class="tab-btn" data-tab="etfs">ETF</button>
    </div>
    <div class="tab-content">
      <div class="tab-panel active" id="panel-sectors"></div>
      <div class="tab-panel" id="panel-themes"></div>
      <div class="tab-panel" id="panel-stocks"></div>
      <div class="tab-panel" id="panel-etfs"></div>
    </div>
  </div>

  <!-- Bottom Panels: Key Actions + Scenario + Positions + Watchlist -->
  <div class="bottom-panels" id="bottomPanels">
    <div class="empty-state">
      <div class="icon">...</div>
      <div>选择一个日期加载数据</div>
    </div>
  </div>
</main>

<script>
/* ================================================================
   Dashboard Engine
   ================================================================ */
(function() {
  'use strict';

  /* ── State ── */
  let snapshot = null;
  let dateList = [];
  let activeDate = null;
  let positions = {};

  /* ── DOM refs ── */
  const $dateNav = document.getElementById('dateNav');
  const $overview = document.getElementById('overview');
  const $bottomPanels = document.getElementById('bottomPanels');
  const $topbarDate = document.getElementById('topbarDate');
  const $topbarGenTime = document.getElementById('topbarGenTime');
  const $topbarMood = document.getElementById('topbarMood');
  const $statusDot = document.getElementById('statusDot');
  const $sidebarFooter = document.getElementById('sidebarFooter');

  /* ── Init ── */
  async function init() {
    await loadPositions();
    await scanDates();
    /* auto-load today's date */
    const today = formatDate(new Date());
    if (dateList.includes(today)) {
      loadDate(today);
    } else if (dateList.length > 0) {
      loadDate(dateList[dateList.length - 1]);
    }
  }

  /* ── Format date YYYY-MM-DD ── */
  function formatDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  /* ── Scan available dates ── */
  async function scanDates() {
    if (typeof EMBEDDED_MODE !== 'undefined' && EMBEDDED_MODE && typeof EMBEDDED_SNAPSHOT !== 'undefined' && EMBEDDED_SNAPSHOT) { dateList = [EMBEDDED_DATE]; loadDate(EMBEDDED_DATE); return; }
    try {
      const resp = await fetch('data/');
      const text = await resp.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/html');
      const links = doc.querySelectorAll('a');
      const re = /trend_snapshot_(\d{4}-\d{2}-\d{2})\.json/;
      dateList = [];
      links.forEach(a => {
        const m = a.href.match(re);
        if (m) dateList.push(m[1]);
      });
      dateList.sort();
    } catch (e) {
      /* Fallback: try common dates */
      console.warn('Cannot scan data/ directory, using fallback:', e);
      const today = new Date();
      for (let i = 60; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        /* Skip weekends */
        if (d.getDay() === 0 || d.getDay() === 6) continue;
        dateList.push(formatDate(d));
      }
    }
    renderDateNav();
  }

  /* ── Render date navigation ── */
  function renderDateNav() {
    if (dateList.length === 0) {
      $dateNav.innerHTML = '<div class="empty-state" style="padding:20px"><div style="font-size:12px">未找到快照文件<br>请先运行趋势引擎</div></div>';
      return;
    }
    const today = formatDate(new Date());
    let html = '';
    dateList.forEach(d => {
      const isToday = d === today;
      const isActive = d === activeDate;
      let cls = 'date-nav-item';
      if (isActive) cls += ' active';
      if (isToday) cls += ' today';
      html += `<button class="${cls}" data-date="${d}">${isToday ? '📅 ' : ''}${d}</button>`;
    });
    $dateNav.innerHTML = html;
    $dateNav.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => loadDate(btn.dataset.date));
    });
  }

  /* ── Load positions.json ── */
  async function loadPositions() {
    try {
      const resp = await fetch('../positions.json');
      if (resp.ok) positions = await resp.json();
    } catch (e) {
      positions = {};
    }
  }

  /* ── Load a date's snapshot ── */
  async function loadDate(date) {
    activeDate = date;
    $topbarDate.textContent = date;
    $topbarGenTime.textContent = '';
    $statusDot.className = 'status-dot ok';
    $sidebarFooter.textContent = '加载中...';
    $bottomPanels.innerHTML = '<div class="empty-state"><div class="icon">...</div><div>加载中...</div></div>';

    try {
      const resp = await fetch(`data/trend_snapshot_${date}.json`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      snapshot = await resp.json();
      renderAll();
      $statusDot.className = 'status-dot ok';
      $sidebarFooter.textContent = `已加载: ${date}`;
    } catch (e) {
      console.error('Load error:', e);
      $statusDot.className = 'status-dot err';
      $sidebarFooter.textContent = `加载失败: ${e.message}`;
      $bottomPanels.innerHTML = `<div class="empty-state"><div class="icon">!</div><div>加载 ${date} 失败<br><small>${e.message}</small></div></div>`;
      $overview.innerHTML = '';
      ['sectors','themes','stocks','etfs'].forEach(id => {
        document.getElementById('panel-' + id).innerHTML = '';
      });
    }

    renderDateNav();
  }

  /* ── Render everything ── */
  function renderAll() {
    if (!snapshot) return;
    renderOverview();
    renderTable('sectors');
    renderTable('themes');
    renderTable('stocks');
    renderTable('etfs');
    renderBottomPanels();
  }

  /* ── Overview Cards ── */
  function renderOverview() {
    const o = snapshot.market_overview || {};
    const actions = snapshot.key_actions || [];
    $topbarGenTime.textContent = snapshot.meta ? ` | 生成于 ${snapshot.meta.generated_at || ''}` : '';
    $topbarMood.textContent = o.market_mood || '';

    $overview.innerHTML = `
      <div class="overview-card green">
        <div class="label">上涨板块</div>
        <div class="value">${o.uptrend_sectors ?? 0}</div>
        <div class="sub">状态3/4/5板块</div>
      </div>
      <div class="overview-card blue">
        <div class="label">活跃题材</div>
        <div class="value">${o.active_themes ?? 0}</div>
        <div class="sub">状态3/4题材</div>
      </div>
      <div class="overview-card purple">
        <div class="label">趋势个股</div>
        <div class="value">${o.trend_stocks ?? 0}</div>
        <div class="sub">状态3/4/5个股</div>
      </div>
      <div class="overview-card orange">
        <div class="label">趋势ETF</div>
        <div class="value">${o.trend_etfs ?? 0}</div>
        <div class="sub">状态3/4/5 ETF</div>
      </div>
      <div class="overview-card ${actions.length > 0 ? 'red' : 'green'}">
        <div class="label">操作点</div>
        <div class="value">${actions.length}</div>
        <div class="sub">${actions.length > 0 ? '需关注' : '无操作'}</div>
      </div>
    `;
  }

  /* ── Table Render ── */
  function renderTable(type) {
    const panel = document.getElementById('panel-' + type);
    const data = snapshot[type] || [];
    if (data.length === 0) {
      panel.innerHTML = '<div class="empty-state"><div class="icon">—</div><div>暂无数据</div></div>';
      return;
    }

    let html = '<table class="data-table"><thead><tr>';

    if (type === 'sectors') {
      html += '<th>板块</th><th>代码</th><th>状态</th><th>阶段</th><th>得分</th><th>条件</th><th>Beta</th><th>链接</th>';
    } else if (type === 'themes') {
      html += '<th>题材</th><th>代码</th><th>状态</th><th>阶段</th><th>得分</th><th>条件</th><th>领涨股</th><th>链接</th>';
    } else if (type === 'stocks') {
      html += '<th>个股</th><th>代码</th><th>状态</th><th>阶段</th><th>得分</th><th>条件</th><th>止损价</th><th>链接</th>';
    } else if (type === 'etfs') {
      html += '<th>ETF</th><th>代码</th><th>状态</th><th>得分</th><th>条件</th><th>置信度</th><th>仓位倍率</th><th>链接</th>';
    }

    html += '</tr></thead><tbody>';
    data.forEach((item, idx) => {
      const stateCls = stateClass(item.state);
      const scoreCls = item.score >= 70 ? 'high' : item.score >= 40 ? 'mid' : 'low';
      const conds = item.conditions || {};

      html += `<tr data-row="${type}-${idx}" class="table-row">`;

      if (type === 'sectors') {
        html += `<td><strong><a class="ext-link" href="${esc(item.external_link)}" target="_blank" onclick="event.stopPropagation()">${esc(item.name)}</a></strong></td>`;
        html += `<td style="color:var(--text-dim);font-size:12px">${esc(item.bk_code || item.symbol)}</td>`;
        html += `<td><span class="state-badge ${stateCls}">${esc(item.state_label)}</span></td>`;
        html += `<td style="font-size:12px;color:var(--text-muted)">${esc(item.stage_label || '—')}</td>`;
        html += `<td>${renderScore(item.score, scoreCls)}</td>`;
        html += `<td>${renderCondDots(conds)}</td>`;
        html += `<td>${item.beta != null ? item.beta : '—'}</td>`;
        html += `<td><a class="ext-link" href="${esc(item.external_link)}" target="_blank" onclick="event.stopPropagation()">同花顺</a></td>`;
      } else if (type === 'themes') {
        html += `<td><strong><a class="ext-link" href="${esc(item.external_link)}" target="_blank" onclick="event.stopPropagation()">${esc(item.name)}</a></strong></td>`;
        html += `<td style="color:var(--text-dim);font-size:12px">${esc(item.gn_code || item.symbol)}</td>`;
        html += `<td><span class="state-badge ${stateCls}">${esc(item.state_label)}</span></td>`;
        html += `<td style="font-size:12px;color:var(--text-muted)">${esc(item.stage_label || '—')}</td>`;
        html += `<td>${renderScore(item.score, scoreCls)}</td>`;
        html += `<td>${renderCondDots(conds)}</td>`;
        html += `<td style="font-size:12px">${renderLeaders(item.leaders)}</td>`;
        html += `<td><a class="ext-link" href="${esc(item.external_link)}" target="_blank" onclick="event.stopPropagation()">同花顺</a></td>`;
      } else if (type === 'stocks') {
        html += `<td><strong><a class="ext-link" href="${esc(item.external_link)}" target="_blank" onclick="event.stopPropagation()">${esc(item.name)}</a></strong></td>`;
        html += `<td style="color:var(--text-dim);font-size:12px">${esc(item.symbol)}</td>`;
        html += `<td><span class="state-badge ${stateCls}">${esc(item.state_label)}</span></td>`;
        html += `<td style="font-size:12px;color:var(--text-muted)">${esc(item.stage_label || '—')}</td>`;
        html += `<td>${renderScore(item.score, scoreCls)}</td>`;
        html += `<td>${renderCondDots(conds)}</td>`;
        html += `<td style="color:${item.stop_loss ? 'var(--red)' : 'var(--text-dim)'}">${item.stop_loss || '—'}</td>`;
        html += `<td><a class="ext-link" href="${esc(item.external_link)}" target="_blank" onclick="event.stopPropagation()">同花顺</a></td>`;
      } else if (type === 'etfs') {
        html += `<td><strong><a class="ext-link" href="${esc(item.external_link)}" target="_blank" onclick="event.stopPropagation()">${esc(item.name)}</a></strong></td>`;
        html += `<td style="color:var(--text-dim);font-size:12px">${esc(item.symbol)}</td>`;
        html += `<td><span class="state-badge ${stateCls}">${esc(item.state_label)}</span></td>`;
        html += `<td>${renderScore(item.score, scoreCls)}</td>`;
        html += `<td>${renderCondDots(conds)}</td>`;
        html += `<td style="font-size:12px">${renderConfidence(item)}</td>`;
        html += `<td>${item.position_multiplier != null ? item.position_multiplier.toFixed(1) + 'x' : '—'}</td>`;
        html += `<td><a class="ext-link" href="${esc(item.external_link)}" target="_blank" onclick="event.stopPropagation()">同花顺</a></td>`;
      }

      html += `</tr>`;
      /* Expand row: "为什么" detail */
      html += `<tr class="expand-row" id="expand-${type}-${idx}"><td colspan="8">`;
      html += renderWhySection(item, type);
      html += `</td></tr>`;
    });
    html += '</tbody></table>';

    panel.innerHTML = html;

    /* Click to expand */
    panel.querySelectorAll('.table-row').forEach(row => {
      row.addEventListener('click', function() {
        const expandRow = document.getElementById('expand-' + this.dataset.row);
        if (expandRow) {
          const isOpen = expandRow.classList.contains('open');
          /* close all */
          panel.querySelectorAll('.expand-row.open').forEach(r => r.classList.remove('open'));
          panel.querySelectorAll('.table-row.expanded').forEach(r => r.classList.remove('expanded'));
          if (!isOpen) {
            expandRow.classList.add('open');
            this.classList.add('expanded');
          }
        }
      });
    });
  }

  /* ── "为什么" section: three conditions + signals + pivots + position ── */
  function renderWhySection(item, type) {
    const conds = item.conditions || {};
    const signals = item.signals || {};
    const pivots = item.pivots || {};

    let html = '<div class="why-section">';

    /* Three conditions */
    ['structure', 'volume', 'persistence'].forEach(key => {
      const c = conds[key] || {};
      const pass = c.pass ? 'pass' : 'fail';
      const labelMap = {structure: 'A.结构', volume: 'B.量能', persistence: 'C.持续性'};
      html += `<div class="why-card">
        <h4>${labelMap[key]} ${c.pass ? '✓' : '✗'}</h4>
        <div class="why-detail ${pass}">${esc(c.detail || '无详情')}</div>
      </div>`;
    });

    html += '</div><div class="why-section-extra">';

    /* Signals */
    const sigLabels = [
      {key: 'above_ma20', label: '站上MA20'},
      {key: 'volume_surge', label: '放量(>1.2x)'},
      {key: 'volume_shrink', label: '缩量(<0.8x)'},
      {key: 'consecutive_rise', label: '连阳'},
      {key: 'consecutive_drop', label: '连阴'},
    ];
    let sigHtml = '';
    sigLabels.forEach(s => {
      const val = signals[s.key];
      const cls = val ? 'pass' : 'fail';
      sigHtml += `<div style="color:${val ? 'var(--green)' : 'var(--text-dim)'}">${val ? '●' : '○'} ${s.label}</div>`;
    });
    html += `<div class="why-extra-item"><h4>信号检测</h4>${sigHtml}</div>`;

    /* Pivots */
    let pivHtml = '';
    if (pivots.prev_high) {
      pivHtml += `<div style="color:var(--green)">前高: ${pivots.prev_high.price} (${pivots.prev_high.date})</div>`;
    } else {
      pivHtml += '<div style="color:var(--text-dim)">前高: 无</div>';
    }
    if (pivots.prev_low) {
      pivHtml += `<div style="color:var(--red)">前低: ${pivots.prev_low.price} (${pivots.prev_low.date})</div>`;
    } else {
      pivHtml += '<div style="color:var(--text-dim)">前低: 无</div>';
    }
    html += `<div class="why-extra-item"><h4>关键价位</h4>${pivHtml}</div>`;

    /* Position derivation */
    let posHtml = `<div>建议仓位: <strong>${(item.position_ratio * 100).toFixed(0)}%</strong></div>`;
    if (item.stage_reasons && item.stage_reasons.length > 0) {
      posHtml += `<div style="font-size:11px;color:var(--text-muted);margin-top:4px">${esc(item.stage_reasons.join('; '))}</div>`;
    }
    if (item.stop_loss) {
      posHtml += `<div style="font-size:12px;color:var(--red);margin-top:4px">止损价: ${item.stop_loss}</div>`;
    }
    if (item.confidence != null) {
      posHtml += `<div style="font-size:12px;color:var(--blue);margin-top:4px">置信度: ${(item.confidence*100).toFixed(0)}% (${esc(item.confidence_source||'')})</div>`;
    }
    html += `<div class="why-extra-item"><h4>仓位推导</h4>${posHtml}</div>`;

    html += '</div>';
    return html;
  }

  /* ── Render Bottom Panels ── */
  function renderBottomPanels() {
    if (!snapshot) return;
    let html = '';

    /* 1. Key Actions */
    const actions = snapshot.key_actions || [];
    if (actions.length > 0) {
      html += '<div class="panel-card key-actions-panel"><h3>⚡ 关键操作点</h3>';
      actions.forEach(a => {
        const priClsMap = {'🔴': 'red', '🟠': 'orange', '🟢': 'green', '🟡': 'yellow'};
        const priCls = priClsMap[a.priority] || 'yellow';
        html += `<div class="key-action-item priority-${priCls}">`;
        html += `<span class="priority-icon">${a.priority}</span>`;
        html += `<span class="action-label">${esc(a.action)}</span>`;
        html += `<span class="transition-label">${esc(a.transition)}</span>`;
        html += `<span class="desc">${esc(a.description)} — ${esc(a.name || a.symbol)}</span>`;
        html += `<span style="font-size:11px;color:var(--text-dim)">仓位: ${esc(a.position_action)}</span>`;
        html += `</div>`;
      });
      html += '</div>';
    }

    /* 2. Comparison / Breadth */
    html += '<div class="panel-card"><h3>市场宽度</h3><div class="breadth-row">';
    const mb = snapshot.market_breadth || {};
    html += `<div class="breadth-item"><div class="bval">${mb.uptrend_sectors ?? '—'}</div><div class="blabel">上涨板块</div></div>`;
    html += `<div class="breadth-item"><div class="bval">${mb.state4_sectors ?? '—'}</div><div class="blabel">状态4板块</div></div>`;
    html += `<div class="breadth-item"><div class="bval">${mb.uptrend_stocks ?? '—'}</div><div class="blabel">趋势个股</div></div>`;
    html += `<div class="breadth-item"><div class="bval">${mb.uptrend_etfs ?? '—'}</div><div class="blabel">趋势ETF</div></div>`;
    html += `<div class="breadth-item"><div class="bval" style="color:${mb.market_health === '强势' ? 'var(--green)' : mb.market_health === '弱势' ? 'var(--red)' : 'var(--yellow)'}">${mb.market_health || '—'}</div><div class="blabel">市场健康度</div></div>`;
    html += '</div>';

    /* Comparison tags */
    const comp = snapshot.comparison || {};
    if (comp.new_uptrend && comp.new_uptrend.length > 0) {
      html += '<div style="margin-top:12px;font-size:12px"><span class="comp-tag up">▲ 新进入上涨: ' + comp.new_uptrend.length + '个</span></div>';
    }
    if (comp.exited_uptrend && comp.exited_uptrend.length > 0) {
      html += '<div style="margin-top:4px;font-size:12px"><span class="comp-tag down">▼ 退出上涨: ' + comp.exited_uptrend.length + '个</span></div>';
    }
    if (comp.note) {
      html += `<div style="margin-top:4px;font-size:11px;color:var(--text-dim)">${esc(comp.note)}</div>`;
    }
    html += '</div>';

    /* 3. Scenario Plans */
    const plans = snapshot.scenario_plans || [];
    if (plans.length > 0) {
      html += '<div class="panel-card"><h3>📋 明日推演</h3><div class="scenario-grid">';
      plans.forEach(p => {
        html += `<div class="scenario-card">`;
        html += `<div class="scenario-card-header">`;
        html += `<span class="name">${esc(p.name || p.symbol)}</span>`;
        html += `<span class="state">${esc(p.current_state)} | 仓位: ${(p.position*100).toFixed(0)}% | 止损: ${p.stop_loss || '—'}</span>`;
        html += `</div>`;
        (p.scenarios || []).forEach(s => {
          const probCls = s.probability === '大概率' ? 'prob-high' : s.probability === '中概率' ? 'prob-mid' : 'prob-low';
          html += `<div class="scenario-item ${probCls}">`;
          html += `<div class="s-label">${esc(s.label)}</div>`;
          html += `<div class="s-cond">条件: ${esc(s.conditions)}</div>`;
          html += `<div class="s-action">操作: ${esc(s.action)} → ${esc(s.next_state)}</div>`;
          html += `</div>`;
        });
        html += `</div>`;
      });
      html += '</div></div>';
    }

    /* 4. Watchlist */
    const watchlist = snapshot.watchlist || [];
    if (watchlist.length > 0) {
      html += '<div class="panel-card"><h3>👀 观察列表 <span class="panel-badge">' + watchlist.length + '</span></h3>';
      watchlist.forEach(w => {
        html += `<div class="watchlist-item">`;
        html += `<span class="wl-symbol">${esc(w.name || w.symbol)}</span>`;
        html += `<span class="state-badge ${stateClass(w.state)}">${esc(w.state_label)}</span>`;
        html += `<span class="wl-reason">${esc(w.reason)}</span>`;
        if (w.prev_high) html += `<span class="wl-ph">前高: ${w.prev_high}</span>`;
        html += `</div>`;
      });
      html += '</div>';
    }

    /* 5. Positions */
    html += '<div class="panel-card"><h3>💼 持仓管理</h3>';
    const posKeys = Object.keys(positions);
    if (posKeys.length > 0) {
      let totalValue = 0;
      posKeys.forEach(k => {
        const p = positions[k];
        html += `<div class="position-row">`;
        html += `<span><strong>${esc(k)}</strong> <span style="font-size:11px;color:var(--text-dim)">${esc(p.name || '')}</span></span>`;
        html += `<span>${p.shares || 0} 股</span>`;
        html += `<span>成本: ${p.cost || '—'}</span>`;
        html += `<span>现价: ${p.current_price || '—'}</span>`;
        const val = (p.shares || 0) * (p.current_price || 0);
        html += `<span style="font-weight:600">市值: ${val.toFixed(0)}</span>`;
        html += `</div>`;
        totalValue += val;
      });
      html += `<div class="position-total"><span>总市值</span><span>${totalValue.toFixed(0)}</span></div>`;
    } else {
      html += '<div style="padding:12px;color:var(--text-dim);font-size:13px">暂无持仓数据 — 编辑 dashboard/positions.json 录入持仓</div>';
    }
    html += '</div>';

    $bottomPanels.innerHTML = html;
  }

  /* ── Helpers ── */
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function stateClass(state) {
    if (state === 1) return 'state-1';
    if (state === 2) return 'state-2';
    if (state === 3) return 'state-3';
    if (state === 4) return 'state-4';
    if (state === 5) return 'state-5';
    if (state === "3'") return 'state-3p';
    return '';
  }

  function renderScore(score, cls) {
    return `<div class="score-bar"><span style="font-weight:700;font-size:13px;min-width:28px">${score}</span>
      <div class="score-bar-inner"><div class="score-bar-fill ${cls}" style="width:${score}%"></div></div></div>`;
  }

  function renderCondDots(conds) {
    const keys = ['structure', 'volume', 'persistence'];
    let html = '';
    keys.forEach(k => {
      const c = conds[k] || {};
      html += `<span class="cond-dot ${c.pass ? 'pass' : 'fail'}" title="${esc(c.detail || '')}"></span>`;
    });
    return html;
  }

  function renderLeaders(leaders) {
    if (!leaders || leaders.length === 0) return '—';
    return leaders.map(l => `${esc(l.symbol)}(${l.score})`).join(', ');
  }

  function renderConfidence(item) {
    const conf = item.confidence;
    if (conf == null) return '—';
    const pct = (conf * 100).toFixed(0);
    const color = conf >= 0.8 ? 'var(--green)' : conf >= 0.6 ? 'var(--yellow)' : conf >= 0.4 ? 'var(--orange)' : 'var(--red)';
    return `<span style="color:${color};font-weight:600">${pct}%</span>
      <div style="font-size:10px;color:var(--text-dim)">${esc(item.confidence_source || '')}</div>`;
  }

  /* ── Tab switching ── */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('panel-' + this.dataset.tab).classList.add('active');
    });
  });

  /* ── Keyboard shortcuts ── */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft' && dateList.length > 0) {
      const idx = dateList.indexOf(activeDate);
      if (idx > 0) loadDate(dateList[idx - 1]);
    } else if (e.key === 'ArrowRight' && dateList.length > 0) {
      const idx = dateList.indexOf(activeDate);
      if (idx < dateList.length - 1) loadDate(dateList[idx + 1]);
    }
  });

  /* ── Start ── */
  init();

})();
</script>
</body>
</html>
